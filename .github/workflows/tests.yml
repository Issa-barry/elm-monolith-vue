name: tests

on:
  pull_request:
    branches:
      - pre-prod
      - production
      - main

jobs:
  ci:
    name: PHPUnit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: pcov
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Build assets
        run: npm run build

      - name: Run PHPUnit with coverage
        run: ./vendor/bin/phpunit --coverage-clover coverage/clover.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/clover.xml
          retention-days: 1

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fail-safe : le E2E complet tourne par défaut. Il n'est skippé que si TOUS
      # les fichiers modifiés sont de la doc (README.md, docs/**, **/*.md). Dès
      # qu'un seul fichier hors doc change (y compris .github/**), non_docs=true.
      - name: Detect non-doc changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            non_docs:
              - '!README.md'
              - '!docs/**'
              - '!**/*.md'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Node dependencies
        run: npm ci

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # Cache miss → télécharge le binaire ET installe les dépendances système (apt)
      - name: Install Playwright browser + system deps (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # Cache hit → binaire déjà restauré, on installe seulement les paquets système (rapide)
      - name: Install Playwright system deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan migrate --seed --force

      - name: Build assets
        env:
          VITE_SHOW_ENTITY_STATS_CARDS: 'true'
        run: npm run build

      # dev → pre-prod : full E2E suite
      # workers=1 : tous les tests partagent le même session cookie (chargé depuis
      # .auth/user.json). Avec workers>1, un worker peut âger (ageFlashData) le flash
      # d'un autre entre son POST et son GET, vidant la bannière de succès avant
      # que le test ne la lise. workers=1 élimine ce conflit de session.
      - name: Run full E2E tests
        if: github.base_ref == 'pre-prod' && steps.filter.outputs.non_docs == 'true'
        env:
          E2E_BASE_URL: http://127.0.0.1:8080
        run: npx playwright test --workers=1

      # pre-prod → production : smoke tests only (fast gate before deploy)
      # production → main : no E2E at all — main only receives an already-deployed,
      # already-smoke-tested commit, PHPUnit (job `ci`) is enough here.
      - name: Run smoke E2E tests
        if: github.base_ref == 'production'
        env:
          E2E_BASE_URL: http://127.0.0.1:8080
        run: npx playwright test tests/e2e/smoke.spec.ts --workers=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.base_ref }}
          path: playwright-report
          retention-days: 7
