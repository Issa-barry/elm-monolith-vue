name: branch-flow

on:
  pull_request:
    branches:
      - pre-prod
      - main

jobs:
  enforce-flow:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR branch flow
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          BASE="$PR_BASE_REF"
          HEAD="$PR_HEAD_REF"

          echo "PR flow: ${HEAD} -> ${BASE}"

          if [ "$BASE" = "pre-prod" ] && [ "$HEAD" != "dev" ]; then
            echo "Invalid flow: only 'dev' can be merged into 'pre-prod'."
            exit 1
          fi

          if [ "$BASE" = "main" ] && [ "$HEAD" != "pre-prod" ]; then
            echo "Invalid flow: only 'pre-prod' can be merged into 'main'."
            exit 1
          fi

          echo "Branch flow valid."
