sonar.projectKey=Issa-barry_elm-monolith-vue
sonar.organization=issa-barry

sonar.sources=app,resources/js

# Exclude non-production code and generated/vendor trees from static analysis.
sonar.exclusions=public/**,node_modules/**,vendor/**,lang/**,database/migrations/**,tests/**,resources/js/**/*.spec.ts

# Keep CPD focused on production code only (app + resources/js).
sonar.cpd.exclusions=tests/**,lang/**,database/migrations/**

sonar.php.coverage.reportPaths=coverage/clover.xml
sonar.sourceEncoding=UTF-8
